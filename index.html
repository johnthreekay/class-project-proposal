<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Project Proposal</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #11111b;
        }

        .panel {
            background-color: #181825;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 24px 32px;
            max-width: 600px;
            width: 100%;
        }

        .panel h1 {
            margin: 0 0 16px 0;
            font-size: 1.5rem;
        }

        .panel p {
            margin: 0 0 8px 0;
            line-height: 1.5;
            color: #333;
        }

        .panel p:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h1 style="color:white;">Class Project Proposal</h1>
        <p style="color:white;">John Keslin</p>
        <p style="color:white;">This will be filled out next sprint!</p>
        <p style="color:white;">Suppington</p>
    </div>
</body>
</html>
